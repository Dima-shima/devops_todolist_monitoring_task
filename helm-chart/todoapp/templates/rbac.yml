apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.todoapp.serviceAccount.name }}
  namespace: {{ .Values.common.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.todoapp.serviceAccount.name }}
  namespace: {{ .Values.common.namespace }}
rules:
- apiGroups: [""]
  resources:
    - secrets
  verbs:
    - get
    - watch
    - list

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.todoapp.serviceAccount.name }}-binding
  namespace: {{ .Values.common.namespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.todoapp.serviceAccount.name }}
  namespace: {{ .Values.common.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.todoapp.serviceAccount.name }}