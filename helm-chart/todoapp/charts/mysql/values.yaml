common:
 namespace: mysql

mysql:
  secrets:
    MYSQL_ROOT_PASSWORD: "1234" # Base64 encoding for "1234"
    MYSQL_USER: "app_user" # Base64 encoding for "app_user"
    MYSQL_PASSWORD: "1234" # Base64 encoding for "1234"

  replicas:
    quantity: 2

  image:
   name: mysql
   version: 8.0

  affinity:
    node:
      key: app
      values:
        - mysql

  tolerations:
        key: "app"
        operator: "Equal"
        value: "mysql"
        effect: "NoSchedule"

  resources:
          requests:
            cpu: 500m
            memory: 1Gi

  pvc:
    requests:
      storage: 2Gi