common:
 namespace: todoapp

todoapp:
 image:
   name: todoapp
   repository: ikulyk404/todoapp
   version: 4.0.1

 affinity:
  node:
    key: app
    values:
      - kube2py

 secrets:
   SECRET_KEY: "@e2(yx)v&tgh3_s=0yja-i!dpebxsz^dg47x)-k&kq_3zf*9e*"
   DB_NAME: "app_db"
   DB_USER: "app_user"
   DB_PASSWORD: "1234"
   DB_HOST: "mysql-0.mysql.mysql.svc.cluster.local"           

 resources:
   requests:
      memory: "256Mi"
      cpu: "150m"
   limits:
     memory: "256Mi"
     cpu: "150m"

 strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

 hpa:
   minReplicas: 2
   maxReplicas: 4
   cpu:
     averageUtilization: 70
   memory:
     averageUtilization: 70

 pv:
   capacity:
    storage: 1Gi

 pvc:
   requests:
    storage: 1Gi
 
 serviceAccount:
  name: secrets-reader

 serviceMonitor:
    enabled: true
    labels: {}
    interval: 10s
    path: /metrics
    port: http